<!doctype html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Gameverse</title>
    <style>
        body { font-family: system-ui, Arial; margin: 0; background: #0f172a; color: #e2e8f0; }
        header { padding: 24px; border-bottom: 1px solid rgba(226,232,240,.1); }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .card { background: rgba(255,255,255,.04); border: 1px solid rgba(226,232,240,.12); border-radius: 14px; padding: 16px; }
        .title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
        .muted { color: #94a3b8; margin: 0 0 12px; font-size: 14px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        a.btn, button.btn {
            display: inline-block; border: 1px solid rgba(226,232,240,.2);
            background: rgba(255,255,255,.06); color: #e2e8f0;
            padding: 8px 10px; border-radius: 10px; text-decoration: none; cursor: pointer;
        }
        a.btn:hover, button.btn:hover { background: rgba(255,255,255,.1); }
        .pill { display:inline-block; font-size:12px; padding:4px 8px; border-radius:999px; background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.25); color:#bbf7d0; }
        pre { white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,.25); padding: 12px; border-radius: 12px; border: 1px solid rgba(226,232,240,.12); }
        .error { color: #fecaca; }
    </style>
</head>
<body>
<header>
    <div class="wrap">
        <h1 style="margin:0 0 6px;">Gameverse</h1>
        <div class="muted">Frontend demo (Spring static) — API: <code>/api/games</code></div>
        <span class="pill" id="status">Loading…</span>
    </div>
</header>

<main class="wrap">
    <div class="grid" id="games"></div>

    <h3 style="margin-top:28px;">Debug</h3>
    <pre id="debug">Fetching /api/games…</pre>
</main>

<script>
    const statusEl = document.getElementById("status");
    const gamesEl = document.getElementById("games");
    const debugEl = document.getElementById("debug");

    function esc(s){ return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

    async function load() {
        try {
            const res = await fetch("/api/games", { headers: { "Accept": "application/json" } });
            const text = await res.text();
            debugEl.textContent = `HTTP ${res.status}\n\n` + text;

            if (!res.ok) {
                statusEl.textContent = "API error";
                statusEl.className = "pill error";
                return;
            }

            const games = JSON.parse(text);
            statusEl.textContent = "API OK";
            gamesEl.innerHTML = games.map(g => `
        <div class="card">
          <div class="title">${esc(g.title)} <span style="font-size:12px;color:#94a3b8;">#${esc(g.id)}</span></div>
          <p class="muted">${esc(g.description)}</p>
          <div class="row">
            ${g.embedUrl ? `<a class="btn" href="${esc(g.embedUrl)}" target="_blank" rel="noreferrer">Embed</a>` : ""}
            <button class="btn" onclick="alert(${JSON.stringify((g.tutorial || 'Nincs tutorial'))})">Tutorial</button>
          </div>
          <div class="muted" style="margin-top:10px;">slug: <code>${esc(g.slug)}</code> • active: <code>${esc(g.active)}</code></div>
        </div>
      `).join("");
        } catch (e) {
            statusEl.textContent = "JS error";
            statusEl.className = "pill error";
            debugEl.textContent = String(e);
        }
    }

    load();
</script>
</body>
</html>
